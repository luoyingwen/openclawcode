name: Bug report
description: Report a reproducible bug
title: "fix(scope): short bug summary"
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: One or two short sentences.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happens instead?
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      description: Select where the bug was observed
      multiple: true
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, and related info (optional)
