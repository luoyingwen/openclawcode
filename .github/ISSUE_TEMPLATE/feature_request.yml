name: Feature request
description: Propose a new feature for discussion before implementation
title: "feat(scope): short feature summary"
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
      placeholder: One or two short sentences.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should be added or changed?
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: User impact
      description: What will users gain and how behavior changes?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional, but helpful
      placeholder: Any other approaches you considered.
